<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; height: 100vh; font-family: monospace; }
  model-viewer { flex: 1; width: 100%; background: #111; }
  #controls { padding: 12px 16px; background: #1a1a1a; display: flex; align-items: center; gap: 12px; }
  #slider { flex: 1; }
  #label { color: #fff; font-size: 13px; min-width: 90px; }
</style>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

<model-viewer
  id="mv"
  src="./Bake/frame_0000.glb"
  camera-controls
  interaction-prompt="none"
  shadow-intensity="0"
  orientation="0deg -90deg 0deg"
  exposure="1"
  style="--progress-bar-color: transparent;">
</model-viewer>

<div id="controls">
  <span style="color:#aaa">Frame</span>
  <input type="range" id="slider" min="0" max="449" value="0">
  <span id="label">0000 / 0449</span>
</div>

<script>
  const mv     = document.getElementById('mv');
  const slider = document.getElementById('slider');
  const label  = document.getElementById('label');

  function pad(n) { return String(n).padStart(4, '0'); }

  let debounce = null;
  slider.addEventListener('input', () => {
    const n = parseInt(slider.value);
    label.textContent = pad(n) + ' / 0449';
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      mv.src = './Bake/frame_' + pad(n) + '.glb';
    }, 150);
  });
</script>
</body>
</html>
